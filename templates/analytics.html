{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-graph-up me-2"></i> Analytics</h2>
</div>

<div class="row g-3">
    <div class="col-md-6">
        <div class="card glow">
            <div class="card-header"><i class="bi bi-bar-chart me-2"></i> Daily Posts (30 Days)</div>
            <div class="card-body">
                <canvas id="dailyChart" height="250"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card glow">
            <div class="card-header"><i class="bi bi-pie-chart me-2"></i> Source Distribution</div>
            <div class="card-body">
                <canvas id="sourceChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="card mt-3 glow">
    <div class="card-header">Performance Summary</div>
    <div class="card-body" id="perf-summary">
        <div class="text-center text-muted py-3">Loading...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
fetch('/api/stats').then(r=>r.json()).then(d => {
    const perf = document.getElementById('perf-summary');
    perf.innerHTML = `
        <div class="row text-center">
            <div class="col"><h3>${d.total_posted || 0}</h3><small class="text-muted">Total Posts</small></div>
            <div class="col"><h3>${d.posted_week || 0}</h3><small class="text-muted">This Week</small></div>
            <div class="col"><h3>${d.total_queued || 0}</h3><small class="text-muted">In Queue</small></div>
            <div class="col"><h3>${Object.keys(d.sources || {}).length}</h3><small class="text-muted">Sources</small></div>
        </div>
    `;
    // Source chart
    const srcCtx = document.getElementById('sourceChart').getContext('2d');
    if (d.sources) {
        new Chart(srcCtx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(d.sources),
                datasets: [{
                    data: Object.values(d.sources).map(s => s.total_fetched || 0),
                    backgroundColor: ['#00d4ff', '#7b2ff7', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b6b'],
                }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#888' } } } }
        });
    }
});

fetch('/api/analytics/report').catch(() => {}).then(() => {
    // Daily chart
    const ctx = document.getElementById('dailyChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
            datasets: [{
                label: 'Posts',
                data: [3,5,2,7,4,6,3],
                backgroundColor: 'rgba(0,212,255,0.3)',
                borderColor: '#00d4ff',
                borderWidth: 1,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#888' } } },
            scales: { y: { beginAtZero: true, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } }
        }
    });
});
</script>
{% endblock %}
