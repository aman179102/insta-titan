{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-terminal me-2"></i> Logs</h2>
    <button class="btn btn-sm btn-outline-primary" onclick="document.getElementById('log-output').textContent='Loading...'; loadLogs()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
</div>
<div class="card glow">
    <div class="card-body p-0">
        <pre id="log-output" class="p-3 mb-0" style="background:#0a0a0f;color:#00ff88;font-size:0.85rem;max-height:70vh;overflow-y:auto;border-radius:12px;white-space:pre-wrap;font-family:'Courier New',monospace;">Loading logs...</pre>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadLogs() {
    const el = document.getElementById('log-output');
    try {
        const r = await fetch('/api/stats');
        const d = await r.json();
        const now = new Date().toISOString().replace('T',' ').substring(0,19);
        el.textContent = `[${now}] System Status
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Queue:      ${d.total_queued || 0} items
Posted:     ${d.total_posted || 0} total
Today:      ${d.posted_today || 0} posts
Week:       ${d.posted_week || 0} posts
Failed:     ${d.failed || 0} items
Last Post:  ${d.last_post_at ? new Date(d.last_post_at).toLocaleString() : 'Never'}
Sources:    ${Object.keys(d.sources || {}).length} active

${Object.entries(d.sources || {}).map(([k,v]) => `  ${k.padEnd(15)} ${v.total_fetched || 0} fetched`).join('\n')}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
✅ System running normally`;
    } catch(e) {
        el.textContent = `❌ Error loading stats: ${e.message}`;
    }
}
loadLogs();
</script>
{% endblock %}
