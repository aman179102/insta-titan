{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-speedometer2 me-2"></i> Dashboard</h2>
    <div>
        <span class="me-3"><span class="live-dot"></span> <small class="text-muted">System Active</small></span>
        <button class="btn btn-sm btn-outline-primary me-2" onclick="fetchImages()"><i class="bi bi-cloud-download"></i> Fetch Now</button>
        <button class="btn btn-sm btn-primary" onclick="postNow()"><i class="bi bi-send"></i> Post Now</button>
    </div>
</div>

<div class="row g-3 mb-4" id="stats-row">
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-label">In Queue</div>
            <div class="stat-value" id="stat-queued">-</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-label">Posted Today</div>
            <div class="stat-value" id="stat-today">-</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-label">Total Posted</div>
            <div class="stat-value" id="stat-total">-</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-label">Failed</div>
            <div class="stat-value" id="stat-failed" style="background: linear-gradient(135deg, #ff4444, #ff7744); -webkit-background-clip: text;">-</div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-md-8">
        <div class="card glow">
            <div class="card-header d-flex justify-content-between">
                <span><i class="bi bi-graph-up me-2"></i> Posting Activity (7 Days)</span>
            </div>
            <div class="card-body">
                <canvas id="activityChart" height="250"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card glow">
            <div class="card-header"><i class="bi bi-grid-3x3-gap me-2"></i> Sources</div>
            <div class="card-body" id="sources-list">
                <div class="text-center text-muted py-4">Loading...</div>
            </div>
        </div>
    </div>
</div>

<div class="card mt-3 glow">
    <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-clock-history me-2"></i> Recent Posts</span>
        <a href="/history" class="btn btn-sm btn-link text-muted">View All</a>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-striped mb-0">
                <thead>
                    <tr>
                        <th>Caption</th>
                        <th>Source</th>
                        <th>Posted</th>
                        <th>Likes</th>
                    </tr>
                </thead>
                <tbody id="recent-posts">
                    <tr><td colspan="4" class="text-center text-muted">No posts yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadStats() {
    fetch('/api/stats').then(r => r.json()).then(d => {
        document.getElementById('stat-queued').textContent = d.total_queued || 0;
        document.getElementById('stat-today').textContent = d.posted_today || 0;
        document.getElementById('stat-total').textContent = d.total_posted || 0;
        document.getElementById('stat-failed').textContent = d.failed || 0;
        const tbody = document.getElementById('recent-posts');
        if (d.recent_posts && d.recent_posts.length) {
            tbody.innerHTML = d.recent_posts.map(p => `
                <tr>
                    <td>${p.caption || 'Untitled'}</td>
                    <td><span class="badge bg-secondary">${p.source}</span></td>
                    <td><small class="text-muted">${new Date(p.posted_at).toLocaleString()}</small></td>
                    <td>${p.likes} ❤️</td>
                </tr>
            `).join('');
        }
        const sourcesDiv = document.getElementById('sources-list');
        if (d.sources && Object.keys(d.sources).length) {
            sourcesDiv.innerHTML = Object.entries(d.sources).map(([name, s]) => `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span><i class="bi bi-dot"></i> ${name}</span>
                    <span class="badge bg-secondary">${s.total_fetched || 0} fetched</span>
                </div>
            `).join('');
        }
    });
}

function fetchImages() {
    fetch('/api/fetch', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({source:'all'})})
    .then(r=>r.json()).then(d=>{
        alert(`Fetched ${d.fetched} images!`);
        loadStats();
    });
}

function postNow() {
    fetch('/api/scheduler/post-now', {method:'POST'}).then(r=>r.json()).then(d=>{
        alert(d.success ? 'Posted!' : 'Failed to post');
        loadStats();
    });
}

loadStats();
setInterval(loadStats, 10000);
</script>
{% endblock %}
