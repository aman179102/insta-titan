{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-clock-history me-2"></i> Post History</h2>
    <div>
        <input type="text" class="form-control form-control-sm d-inline-block" style="width:250px" id="search-input" placeholder="Search history...">
        <button class="btn btn-sm btn-primary" onclick="searchHistory()"><i class="bi bi-search"></i></button>
    </div>
</div>

<div class="card glow">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark mb-0">
                <thead>
                    <tr>
                        <th>Caption</th>
                        <th>Source</th>
                        <th>Posted At</th>
                        <th>Platform</th>
                        <th>Likes</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody id="history-list">
                    <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadHistory(query) {
    const url = query ? `/api/history?q=${encodeURIComponent(query)}` : '/api/history';
    fetch(url).then(r=>r.json()).then(items => {
        const tbody = document.getElementById('history-list');
        if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No posts yet</td></tr>';
            return;
        }
        tbody.innerHTML = items.map(h => `
            <tr>
                <td><small>${h.caption || 'Untitled'}</small></td>
                <td><span class="badge bg-secondary">${h.source}</span></td>
                <td><small class="text-muted">${new Date(h.posted_at).toLocaleString()}</small></td>
                <td><span class="badge bg-info text-dark">instagram</span></td>
                <td>${h.likes}</td>
                <td>${h.post_url ? `<a href="${h.post_url}" target="_blank"><i class="bi bi-box-arrow-up-right"></i></a>` : '-'}</td>
            </tr>
        `).join('');
    });
}

function searchHistory() {
    const q = document.getElementById('search-input').value;
    loadHistory(q);
}

document.getElementById('search-input').addEventListener('keyup', e => {
    if (e.key === 'Enter') searchHistory();
});

loadHistory();
</script>
{% endblock %}
